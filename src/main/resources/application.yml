server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        # User Service — auth and user endpoints
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/auth/**

        - id: user-service-api
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        # Property Service
        - id: property-service
          uri: lb://property-service
          predicates:
            - Path=/api/v1/properties/**

        # Maintenance Service
        - id: maintenance-service
          uri: lb://maintenance-service
          predicates:
            - Path=/api/v1/maintenance-requests/**

        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
